<!DOCTYPE html>
<html>
<head>
    <title>Nebula Media API</title>
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<style>
    body {
        background-color: #1a1a1a;
        color: #00ffff;
        font-family: Arial, sans-serif;
        font-size: 16px;
    }
    
    h1, h2 {
        margin: 0;
        padding: 0;
        text-align: center;
    }
    
    h1 {
        font-size: 48px;
        color: #00ffff;
        margin-top: 50px;
        text-shadow: 0px 0px 10px #00ffff;
    }
    
    h2 {
        font-size: 36px;
        margin-top: 30px;
        text-shadow: 0px 0px 5px #00ffff;
    }
    
    p {
        margin-top: 20px;
        margin-bottom: 10px;
        text-shadow: 0px 0px 3px #00ffff;
    }
    
    input[type=text] {
        padding: 10px;
        border-radius: 5px;
        border: none;
        background-color: #333;
        color: #fff;
        width: 80%;
        margin: 0 auto;
        display: block;
        box-shadow: 0px 0px 5px #00ffff;
        outline: none;
        transition: box-shadow 0.3s ease-in-out;
    }
    
    input[type=text]:focus {
        box-shadow: 0px 0px 10px #00ffff;
    }
    
    button {
        background-color: transparent;
        color: #00ffff;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        display: block;
        margin: 20px auto;
        font-size: 18px;
        cursor: pointer;
        text-shadow: 0px 0px 5px #00ffff;
        transition: box-shadow 0.3s ease-in-out;
    }
    
    button:hover, button:focus {
        box-shadow: 0px 0px 10px #00ffff;
    }
    
    hr {
        border: none;
        border-bottom: 2px solid #00ffff;
        margin-top: 50px;
    }
    
    pre {
        padding: 20px;
        background-color: #333;
        border: 2px solid #00ffff;
        border-radius: 5px;
        white-space: pre-wrap;
        overflow-wrap: break-word;
        text-shadow: 0px 0px 5px #00ffff;
    }
    
    #movieInfo {
        border: 2px solid #00ffff;
        border-radius: 5px;
        padding: 20px;
        margin-top: 20px;
        text-shadow: 0px 0px 5px #00ffff;
        box-shadow: 0px 0px 10px #00ffff;
    }
    
    #poster {
        border: 2px solid #00ffff;
        border-radius: 5px;
        margin-top: 20px;
        box-shadow: 0px 0px 10px #00ffff;
    }
</style>
<script>
        function searchMovie(movie) {
              $.ajax({
                    url: "https://www.omdbapi.com/",
                    data: {t: movie, apikey: "67614538"},
                    dataType: "json",
                    success: function(result){
                          var posterUrl = result.Poster;
                          delete result.Poster;  // remove the poster value from the result object
                          
                          var htmlResult = `<p><strong>Title:</strong> ${result.Title}</p>
                          <p><strong>Year:</strong> ${result.Year}</p>
                          <p><strong>Rated:</strong> ${result.Rated}</p>
                          <p><strong>Released:</strong> ${result.Released}</p>
                          <p><strong>Runtime:</strong> ${result.Runtime}</p>
                          <p><strong>Genre:</strong> ${result.Genre}</p>
                          <p><strong>Director:</strong> ${result.Director}</p>
                          <p><strong>Writer:</strong> ${result.Writer}</p>
                          <p><strong>Actors:</strong> ${result.Actors}</p>
                          <p><strong>Plot:</strong> ${result.Plot}</p>
                          <p><strong>Language:</strong> ${result.Language}</p>
                          <p><strong>Country:</strong> ${result.Country}</p>
                          <p><strong>Awards:</strong> ${result.Awards}</p>`;
                          if (posterUrl !== "N/A") {  // display poster only if it's available
                          htmlResult += `<img src="${posterUrl}">`;
                          }
                          $("#movieInfo").html(htmlResult);
                          
                          var imdbID = result.imdbID;
                          var url = `https://byt3w1z4rd.github.io/player?media=${imdbID}`;
                          }
              });
        }
        $(document).ready(function(){
              $("#btnSearch").click(function(){
                    var movie = $("#txtSearch").val();
                    searchMovie(movie);
              });
        });
        var imdbID = result.imdbID;
        var url = `https://byt3w1z4rd.github.io/player?media=${imdbID}`;
    </script>
</head>
<body>
    <h1>Nebula Media API</h1>
    <p>Search Name Of Movie Or Series:</p>
    <input type="text" id="txtSearch">
    <button id="btnSearch">Get Info</button>
    <button id="btnWatch" onclick="window.location.href = url;">Watch Movie</button>
    <h2>Movie/Show Information</h2>
    <pre id="movieInfo"></pre>
    <img id="poster">
</body>
</html>
