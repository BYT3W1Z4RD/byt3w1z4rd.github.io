<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>GitHub Repos and Releases</title>
  </head>
  <body>
    <h1>GitHub Repos and Releases</h1>
    <form>
      <label for="user">Enter GitHub username:</label>
      <input type="text" id="user" name="user">
      <button type="submit">Submit</button>
    </form>
    <div id="repos"></div>
    <script>
      // Add JavaScript to fetch and display the repos and releases
      const form = document.querySelector("form");
      const reposContainer = document.querySelector("#repos");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const user = form.elements.user.value;
        reposContainer.innerHTML = "Loading...";

        try {
          const reposResponse = await fetch(`https://api.github.com/users/${user}/repos`);
          const repos = await reposResponse.json();

          reposContainer.innerHTML = repos
            .map((repo) => {
              return `
                <div>
                  <h2>${repo.name}</h2>
                  <select id="${repo.name}-releases">
                    <option value="">Select a release</option>
                  </select>
                </div>
              `;
            })
            .join("");

          repos.forEach(async (repo) => {
            const releasesResponse = await fetch(`https://api.github.com/repos/${user}/${repo.name}/releases`);
            const releases = await releasesResponse.json();

            const releasesSelect = document.querySelector(`#${repo.name}-releases`);

            releases.forEach((release) => {
              const option = document.createElement("option");
              option.value = release.html_url;
              option.text = release.name;
              releasesSelect.appendChild(option);
            });
          });
        } catch (error) {
          reposContainer.innerHTML = `Error: ${error}`;
        }
      });
    </script>
  </body>
</html>
