<!DOCTYPE html>
<html>
<head>
	<title>GitHub Repositories of BYT3W1Z4RD</title>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script>
		$(document).ready(function(){
			$.getJSON("https://api.github.com/users/BYT3W1Z4RD/repos", function(data){
				var repos = data;
				var repoList = "";
				for(var i=0; i<repos.length; i++){
					repoList += "<div><h3>" + repos[i].name + "</h3><p>" + repos[i].description + "</p><button class='accordion'>Readme</button><div class='panel'><pre>Loading...</pre></div></div>";
				}
				document.getElementById("repoList").innerHTML = repoList;
				
				var acc = document.getElementsByClassName("accordion");
				for (var i = 0; i < acc.length; i++) {
					acc[i].addEventListener("click", function() {
						this.classList.toggle("active");
						var panel = this.nextElementSibling;
						if (panel.innerHTML == "<pre>Loading...</pre>") {
							$.get("https://raw.githubusercontent.com/BYT3W1Z4RD/" + this.parentElement.getElementsByTagName("h3")[0].innerHTML + "/main/README.md", function(data) {
								panel.innerHTML = "<pre>" + data + "</pre>";
							}).fail(function() {
								panel.innerHTML = "<p>README.md not found.</p>";
							});
						}
						panel.classList.toggle("show");
					});
				}
			});
		});
	</script>
	<style>
		body {
			background-color: #181818;
			color: white;
		}
		h1 {
			color: #9000ff;
		}
		.accordion {
			background-color: #131313;
			color: #ccc;
			cursor: pointer;
			padding: 18px;
			width: 100%;
			text-align: left;
			border: none;
			outline: none;
			transition: 0.4s;
		}

		.active, .accordion:hover {
			background-color: #9000ff;
			color: white;
		}

		.panel {
			padding: 0 18px;
			background-color: #181818;
			max-height: 0;
			overflow: hidden;
			transition: max-height 0.2s ease-out;
		}

		.panel.show {
			max-height: 500px;
		}

		.panel pre {
			max-height: 300px;
			overflow-y: auto;
			background-color: #131313;
			color: #ccc;
		}
	</style>
</head>
<body>
	<h1>GitHub Repositories of BYT3W1Z4RD</h1>
	<div id="repoList"></div>
</body>
</html>
