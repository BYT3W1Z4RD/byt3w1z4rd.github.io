<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>BYT3W1Z4RD's GitHub Repositories</title>
  </head>
  <body>
    <h1>BYT3W1Z4RD's GitHub Repositories</h1>
    <ul id="repoList"></ul>
    <script>
      const username = 'BYT3W1Z4RD';
      const repoList = document.getElementById('repoList');
      const apiUrl = `https://api.github.com/users/${username}/repos`;
      
      fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
          data.forEach(repo => {
            const repoItem = document.createElement('li');
            const repoLink = document.createElement('a');
            repoLink.href = repo.html_url;
            repoLink.innerText = repo.name;
            repoItem.appendChild(repoLink);
            const repoDesc = document.createElement('p');
            repoDesc.innerText = repo.description;
            repoItem.appendChild(repoDesc);
            repoList.appendChild(repoItem);
          });
        })
        .catch(error => {
          console.error(`Error fetching ${username}'s repositories:`, error);
        });
    </script>
  </body>
</html>
