<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>My GitHub Repositories</title>
	<style>
		body {
			font-family: Arial, Helvetica, sans-serif;
			background-color: #f1f1f1;
			margin: 0;
		}
		
		.container {
			padding: 20px;
			background-color: #fff;
			margin-top: 30px;
			box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
		}
		
		h1 {
			text-align: center;
			margin-top: 0;
		}
		
		.repo {
			border-bottom: 1px solid #ddd;
			padding: 10px;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}
		
		.repo-info {
			margin-left: 10px;
			flex: 1;
		}
		
		.repo-info h3 {
			margin-top: 0;
			margin-bottom: 10px;
		}
		
		.repo-info p {
			margin: 0;
			font-size: 14px;
			color: #888;
		}
		
		.accordion {
			background-color: #eee;
			color: #444;
			cursor: pointer;
			padding: 18px;
			width: 100%;
			border: none;
			text-align: left;
			outline: none;
			font-size: 15px;
			transition: 0.4s;
		}
		
		.active, .accordion:hover {
			background-color: #ccc;
		}
		
		.panel {
			padding: 0 18px;
			background-color: white;
			max-height: 0;
			overflow: hidden;
			transition: max-height 0.2s ease-out;
		}
		
		pre {
			white-space: pre-wrap;
			word-wrap: break-word;
			padding: 0;
			margin: 0;
			background-color: #f1f1f1;
			border-radius: 5px;
			font-size: 14px;
			color: #333;
			padding: 10px;
			max-height: 300px;
			overflow: auto;
			border: none;
			margin-top: 10px;
			margin-bottom: 0;
		}
	</style>
</head>
<body>
	<h1>My GitHub Repositories</h1>
	<div class="container">
		<div id="repoList"></div>
	</div>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function(){
        $.getJSON("https://api.github.com/users/BYT3W1Z4RD/repos", function(data){
            var repos = data;
            var repoList = "";
            for(var i=0; i<repos.length; i++){
                repoList += "<div class='repo'><div class='repo-info'><h3>" + repos[i].name + "</h3><p>" + repos[i].description + "</p><button class='accordion'>Readme</button><div class='panel'><pre>Loading...</pre></div></div></div>";
            }
            document.getElementById("repoList").innerHTML = repoList;

            var acc = document.getElementsByClassName("accordion");
            for (var i = 0; i < acc.length; i++) {
                acc[i].addEventListener("click", function() {
                    this.classList.toggle("active");
                    var panel = this.nextElementSibling;
                    if (panel.style.display === "block") {
                        panel.style.display = "none";
                    } else {
                        panel.style.display = "block";
                        var repoName = this.previousElementSibling.querySelector("h3").innerHTML;
                        var readmeUrl = "https://raw.githubusercontent.com/BYT3W1Z4RD/" + repoName + "/master/README.md";
                        fetch(readmeUrl).then(response => response.text()).then((data) => {
                            panel.querySelector("pre").innerHTML = data;
                        });
                    }
                });
            }
        });
    });
</script>
