<!DOCTYPE html>
<html>
  <head>
    <title>Nebula Media Player</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #player {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="player" frameborder="0" allowfullscreen></iframe>
    <script>
      function createPlayerURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const mi = urlParams.get('mi');
            const mt = urlParams.get('mt');
            const si = urlParams.get('si');
            const st = urlParams.get('st');
            const season = urlParams.get('season');
            const episode = urlParams.get('episode');
            let playerURL = '';
            if (mi) {
                  playerURL = `https://www.2embed.to/embed/imdb/movie?id=${mi}`;
            } else if (mt) {
                  playerURL = `https://www.2embed.to/embed/tmdb/movie?id=${mt}`;
            } else if (si) {
                  playerURL = `https://www.2embed.to/embed/imdb/tv?id=${si}&s=1&e=1`;
            } else if (st) {
                  playerURL = `https://www.2embed.to/embed/tmdb/tv?id=${st}&s=1&e=1`;
            } else {
                  playerURL = `https://www.2embed.to/embed/imdb/tv?id=tt0903747&s=1&e=1`;
            }
            return playerURL;
      }
      const playerURL = createPlayerURL();
      const player = document.getElementById('player');
      player.src = playerURL;
    </script>
  </body>
</html>
