<!DOCTYPE html>
<html>
  <head>
    <title>Nebula Media Player</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #player {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="player" frameborder="0" allowfullscreen></iframe>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const imdbID = urlParams.get('media');
      let playerURL;
      if (urlParams.has('movie')) {
        playerURL = `https://www2.2embed.ru/embed/imdb/movie?id=${imdbID}`;
      } else if (urlParams.has('show')) {
        playerURL = `https://www2.2embed.ru/embed/imdb/tv?id=${imdbID}`;
      }
      const player = document.getElementById('player');
      player.src = playerURL;
    </script>
  </body>
</html>
