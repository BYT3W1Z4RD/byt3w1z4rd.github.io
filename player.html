<!DOCTYPE html>
<html>
  <head>
    <title>Nebula Media Player</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #player {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 40px;
        left: 0;
      }

      #topbar {
        height: 40px;
        background-color: #333;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        box-sizing: border-box;
        padding: 0 20px;
      }

      #seasons {
        display: flex;
        align-items: center;
      }

      #seasons label {
        margin-right: 10px;
      }

      #episodes {
        display: flex;
        align-items: center;
      }

      #episodes label {
        margin-right: 10px;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <div id="seasons">
        <label for="season-select">Season:</label>
        <select id="season-select"></select>
      </div>
      <div id="episodes">
        <label for="episode-select">Episode:</label>
        <select id="episode-select"></select>
      </div>
    </div>
    <iframe id="player" frameborder="0" allowfullscreen></iframe>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const imdbID = urlParams.get('show');
      const playerURL = `https://www.2embed.to/embed/tmdb/tv?id=${imdbID}`;
      const player = document.getElementById('player');
      player.src = playerURL;

      if (imdbID) {
        const seasonSelect = document.getElementById('season-select');
        const episodeSelect = document.getElementById('episode-select');

        for (let i = 1; i <= 10; i++) {
          const option = document.createElement('option');
          option.value = i;
          option.text = `Season ${i}`;
          seasonSelect.add(option);
        }

        for (let i = 1; i <= 20; i++) {
          const option = document.createElement('option');
          option.value = i;
          option.text = `Episode ${i}`;
          episodeSelect.add(option);
        }

        seasonSelect.addEventListener('change', () => {
          const season = seasonSelect.value;
          const episode = episodeSelect.value;
          player.src = `https://www.2embed.to/embed/tmdb/tv?id=${imdbID}&s=${season}&e=${episode}`;
        });

        episodeSelect.addEventListener('change', () => {
          const season = seasonSelect.value;
          const episode = episodeSelect.value;
          player.src = `https://www.2embed.to/embed/tmdb/tv?id=${imdbID}&s=${season}&e=${episode}`;
        });
      } else {
        const topbar = document.getElementById('topbar');
        topbar.style.display = 'none';
      }
    </script>
  </body>
</html>
