<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta property="og:title" content="Nebula Media Player">
    <meta property="og:description" content="Nebula Is The Biggest Library Of HD Movies and TV Shows Online. 100% Free With No Account Signup Required.">
    <meta property="og:image" content="https://i.imgur.com/kO03yyM_d.webp?maxwidth=760&fidelity=grand">
    <meta property="og:url" content="https://byt3w1z4rd.github.io/player">
    <meta property="og:type" content="website">
    <title>Nebula Media Player</title>
    <link rel="icon" href="https://i.imgur.com/kO03yyM_d.webp?maxwidth=760&fidelity=grand" type="image/png">
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #player {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="player" frameborder="0" allowfullscreen></iframe>
    <script>
      function createPlayerURL() {
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('movie');
        const showID = urlParams.get('show');
        const season = urlParams.get('season');
        const episode = urlParams.get('episode');
        let playerURL = '';
        if (movieID) {
              playerURL = `https://www.2embed.to/embed/imdb/movie?id=${movieID}`;
        }
        else {
              playerURL = `https://www.2embed.to/embed/imdb/tv?id=${showID}&s=${season}&e=${episode}`;
        }
        return playerURL;
      }
      const playerURL = createPlayerURL();
      const player = document.getElementById('player');
      player.src = playerURL;
    </script>
  </body>
</html>
