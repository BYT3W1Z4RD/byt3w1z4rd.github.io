<!DOCTYPE html>
<html>
<head>
	<title>OMDb Movie/TV API</title>
	<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
	<script>
		$(document).ready(function(){
			$("#btnSearch").click(function(){
				var movie = $("#txtSearch").val();
				$.ajax({
					url: "https://www.omdbapi.com/",
					data: {t: movie, apikey: "67614538"},
					dataType: "json",
					success: function(result){
						var jsonResult = JSON.stringify(result);
						$("#movieInfo").text(jsonResult);
					}
				});
			});
		});
	</script>
</head>
<body>
	<h1>OMDb Movie/TV API</h1>
	<p>Enter the name of a movie or TV show to retrieve information:</p>
	<input type="text" id="txtSearch">
	<button id="btnSearch">Search</button>
	<hr>
	<h2>Movie/TV Show Information</h2>
	<pre id="movieInfo"></pre>
</body>
</html>
