<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta property="og:title" content="Nebula Media">
    <meta property="og:description" content="Nebula Is The Biggest Library Of HD Movies and TV Shows Online. 100% Free With No Ads and No Account Signup Required.">
    <meta property="og:image" content="https://i.imgur.com/kO03yyM_d.webp?maxwidth=760&fidelity=grand">
    <meta property="og:url" content="https://byt3w1z4rd.github.io/movies">
    <meta property="og:type" content="website">
    <title>Nebula Media</title>
    <link rel="icon" href="https://i.imgur.com/kO03yyM_d.webp?maxwidth=760&fidelity=grand" type="image/png">
    <style>
    /* Global styles */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background-color: #1e1e1e;
  color: #ffffff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 16px;
}

h1 {
  margin-top: 20px;
  margin-bottom: 40px;
  text-align: center;
  text-shadow: 0px 0px 10px #000000;
}

/* Form styles */
form {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

label {
  font-size: 18px;
  margin-right: 10px;
}

input[type="text"] {
  padding: 10px;
  font-size: 16px;
  background-color: #2d2d2d;
  border: none;
  color: #ffffff;
  border-radius: 20px;
  width: 30%;
  position: absolute;
  center: 0px;
}

button[type="button"] {
    margin : 10px;
  padding: 10px;
  font-size: 16px;
  background-color: #0078d4;
  color: #ffffff;
  border: none;
  cursor: pointer;
  border-radius: 20px;
  display: block;
}

button[id="searchMovie"] {
  position: absolute;
  right: 442px;
}

button[type="button"]:hover {
  background-color: #005a9e;
}

/* Sort Select Styles */
#sort-select {
  background-color: #333;
  color: #fff;
  border: none;
  padding: 10px;
  border-radius: 5px;
  font-size: 16px;
  margin-bottom: 20px;
  cursor: pointer;
  text-align: center;
  position: absolute;
  right: 30px;
}

#sort-select option {
  background-color: #333;
  color: #fff;
  border: none;
  padding: 10px;
  font-size: 16px;
}

#sort-select option:hover {
  background-color: #444;
}

#sort-select option:checked {
  background-color: #555;
}

/* Results styles */
#results {
  height: 100%;
  width: 100%;
  overflow-y: scroll;
  margin-top: 30px;
}

.movie {
  display: flex;
  align-items: center;
  margin: 10px;
  background-color: #2d2d2d;
  padding: 10px;
  border-radius: 15px;
  box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.5);
}

.movie:hover {
  box-shadow: 0px 4px 10px rgba(0, 0, 0, 1);
}

.movie img {
  width: 200px;
  height: 300px;
  margin-right: 20px;
  cursor: pointer;
  border-radius: 5px;
}

.movie-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  margin: 10px;
  color: #ffffff;
}

.movie-info h3 {
  font-size: 24px;
  margin-bottom: 5px;
}

.movie-info p {
  margin: 5px;
  font-size: 16px;
}

.watch-now {
  margin: 10px;
}

.watch-now button {
  margin : 10px;
  padding: 10px;
  font-size: 16px;
  background-color: #0078d4;
  color: #ffffff;
  border: none;
  cursor: pointer;
  border-radius: 20px;
  display: block;
}

.watch-now button:hover {
  background-color: #005a9e;
}

.movie-details {
  margin-top: 10px;
}

.movie-details h2 {
  font-size: 24px;
  margin-bottom: 10px;
}

.movie-details p {
  margin: 5px;
  font-size: 16px;
}

.movie-details .details {
  display: flex;
  flex-wrap: wrap;
}

.movie-details .details p {
  margin-right: 20px;
}

.movie-details .watch-now {
  margin-top: 20px;
}

    </style>
  </head>
  <body>
    <h1>Nebula Media</h1>
    <form>
        <select id="sort-select">
        <option value="">Sort By:</option>
        <option value="title-asc">a-Z</option>
        <option value="title-desc">Z-a</option>
        <option value="release-date-desc">Newest-Oldest</option>
        <option value="release-date-asc">Oldest-Newest</option>
        </select>
      <input type="text" id="movie" name="movie">
      <button type="button" id="searchMovie" onclick="searchMovies()">Search</button>
    </form>
    <div id="results"></div>
    <script>
    window.addEventListener("load", searchMovies);
    searchInput.addEventListener("keyup", function (event) {
      if (event.keyCode === 13) {
        event.preventDefault();
        searchMovies();
      }
    });

    const apiKeyTmdb = "0ae47aadd2d85a324c238972cedab662";
    const apiKeyOmdb = "67614538";
    const apiUrlTmdb = `https://api.themoviedb.org/3/search/movie?api_key=${apiKeyTmdb}&query=`;
    const apiUrlOmdb = `https://www.omdbapi.com/?apikey=${apiKeyOmdb}&plot=full&t=`;
    const searchInput = document.querySelector("#movie");
    const moviesContainer = document.querySelector("#results");
    
    const sortSelect = document.querySelector("#sort-select");
    sortSelect.addEventListener("change", () => {
        sortMovies(sortSelect.value);
        
    });
    
    function sortMovies(sortOption) {
  const movies = Array.from(moviesContainer.children);
  switch (sortOption) {
    case "title-asc":
      movies.sort((a, b) => a.querySelector("h3").textContent.localeCompare(b.querySelector("h3").textContent));
      break;
    case "title-desc":
      movies.sort((a, b) => b.querySelector("h3").textContent.localeCompare(a.querySelector("h3").textContent));
      break;
    case "release-date-asc":
      movies.sort((a, b) => a.querySelector("p:nth-child(2)").textContent.localeCompare(b.querySelector("p:nth-child(2)").textContent));
      break;
    case "release-date-desc":
      movies.sort((a, b) => b.querySelector("p:nth-child(2)").textContent.localeCompare(a.querySelector("p:nth-child(2)").textContent));
      break;
    default:
      // do nothing if the default option is selected
      return;
  }
  movies.forEach((movie) => moviesContainer.appendChild(movie));
}

    
    async function searchMovies() {
  const searchTerm = searchInput.value;
  if (searchTerm) {
    try {
      const response = await fetch(apiUrlTmdb + searchTerm);
      const data = await response.json();
      const movies = data.results;
      showMovies(movies);
    } catch (error) {
      console.log(error);
    }
  } else {
    // fetch movies currently playing in theaters
    try {
      const nowPlayingUrl = `https://api.themoviedb.org/3/movie/now_playing?api_key=${apiKeyTmdb}&language=en-US&page=1`;
      const response = await fetch(nowPlayingUrl);
      const data = await response.json();
      const movies = data.results;
      showMovies(movies);
    } catch (error) {
      console.log(error);
    }
  }
}


    function showMovies(movies) {
        moviesContainer.innerHTML = "";
        movies.forEach((movie) => {
            const { id, title, release_date, poster_path, vote_average } = movie;
            const movieElement = document.createElement("div");
            movieElement.classList.add("movie");
            movieElement.innerHTML = `
            <img src="https://image.tmdb.org/t/p/w500/${poster_path}" alt="${title}">
            <div class="movie-info">
            <h3>${title}</h3>
            <p><span>Year: </span>${release_date ? release_date.split("-")[0] : "Unknown"}</p>
            <p>${vote_average}/10<span>★
            <div class="watch-now">
            <button onclick="showDetails(event, '${title}')">Details</button>
            </div>
            </div>
            `;
            moviesContainer.appendChild(movieElement);
            
        });
        
    }

    async function showDetails(event, title) {
        event.stopPropagation();
        const response = await fetch(apiUrlOmdb + encodeURIComponent(title)); // encode title to handle special characters
        const data = await response.json();
        const { Plot, imdbRating, Rated, Year, Runtime, Genre, Director, Writer, Actors, Awards, imdbID } = data;
        const movieDetails = document.createElement("div");
        movieDetails.classList.add("movie-details");
        movieDetails.innerHTML = `
        <div class="details">
        <p><span>Age Rating: </span>${Rated}</p>
        <p><span>Runtime: </span>${Runtime}</p>
        <p><span>Genre: </span>${Genre}</p>
        <p><span>Director: </span>${Director}</p>
        <p><span>Writers: </span>${Writer}</p>
        <p><span>Actors: </span>${Actors}</p>
        <p><span>Awards: </span>${Awards}</p>
        <p><span>Plot: </span>${Plot}</p>
        <div class="watch-now">
        <button id="btnWatch" onclick="window.location.href = 'player?mi=${imdbID}'">Watch Now</button>
        </div>
        `;
        event.target.parentNode.appendChild(movieDetails);
        event.target.parentNode.removeChild(event.target);
    }
</script>
</body>
</html>
